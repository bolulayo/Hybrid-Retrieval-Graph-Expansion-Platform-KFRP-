name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ingestion deps
        working-directory: services/ingestion
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ingestion tests
        working-directory: services/ingestion
        run: pytest -q

      - name: Install retrieval deps
        working-directory: services/retrieval
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run retrieval tests
        working-directory: services/retrieval
        run: pytest -q
