name: kfrp
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kfrp
      POSTGRES_PASSWORD: kfrp
      POSTGRES_DB: kfrp
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports: ["7474:7474", "7687:7687"]
    volumes:
      - neodata:/data

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api-gateway:
    build: ./services/api_gateway
    environment:
      INGESTION_URL: http://ingestion:8001
      RETRIEVAL_URL: http://retrieval:8002
    ports: ["8080:8080"]
    depends_on: [ingestion, retrieval]

  ingestion:
    build: ./services/ingestion
    environment:
      DATABASE_URL: postgresql+psycopg://kfrp:kfrp@postgres:5432/kfrp
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      REDIS_URL: redis://redis:6379/0
    ports: ["8001:8001"]
    depends_on: [postgres, neo4j, redis]

  retrieval:
    build: ./services/retrieval
    environment:
      DATABASE_URL: postgresql+psycopg://kfrp:kfrp@postgres:5432/kfrp
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    ports: ["8002:8002"]
    depends_on: [postgres, neo4j]

volumes:
  pgdata:
  neodata:
